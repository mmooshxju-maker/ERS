<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تقسیمِ اِرث — محاسبه‌گرِ فقهِ امامیه (جعفری)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;}</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.0/babel.min.js"></script>

<script type="text/babel" data-presets="react">

/* ============================================================
   محرک محاسبه — علم الفرائض (فقه امامیه / جعفری)
   ============================================================ */

function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while (b) { const t = b; b = a % b; a = t; }
  return a || 1;
}
class Frac {
  constructor(n, d = 1) {
    if (d === 0) d = 1;
    if (d < 0) { n = -n; d = -d; }
    const g = gcd(n, d) || 1;
    this.n = n / g; this.d = d / g;
  }
  add(o) { return new Frac(this.n * o.d + o.n * this.d, this.d * o.d); }
  sub(o) { return new Frac(this.n * o.d - o.n * this.d, this.d * o.d); }
  mul(o) { return new Frac(this.n * o.n, this.d * o.d); }
  div(o) { return new Frac(this.n * o.d, this.d * o.n); }
  toNumber() { return this.n / this.d; }
  isZero() { return this.n === 0; }
}
const F = (n, d = 1) => new Frac(n, d);
const ZERO = F(0);

const faDigits = ["۰","۱","۲","۳","۴","۵","۶","۷","۸","۹"];
function toFa(input) {
  return String(input).replace(/[0-9]/g, (d) => faDigits[+d]).replace(/\./g, "٫");
}
function formatRial(n) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  const rounded = Math.round(n);
  const withCommas = rounded.toLocaleString("en-US");
  return toFa(withCommas).replace(/,/g, "٬") + " ریال";
}
function formatPercent(frac) {
  return toFa((frac.toNumber() * 100).toFixed(2)) + "٪";
}

function calculateInheritance(inp) {
  const heirs = [];
  const warnings = [];

  const hasLivingChildren = inp.sons > 0 || inp.daughters > 0;
  const deceasedChildBranches = (inp.deceasedChildren || []).filter(
    (c) => c.sons + c.daughters > 0
  );
  const hasDescendants = hasLivingChildren || deceasedChildBranches.length > 0;
  const hasParents = inp.fatherAlive || inp.motherAlive;
  const hasClass1 = hasDescendants || hasParents;
  let activeClass = "هیچ‌کدام";

  // ---------- زوجیت ----------
  let spouseFrac = ZERO;
  if (inp.gender === "male") {
    if (inp.spouseAlive && inp.wivesCount > 0) {
      spouseFrac = hasDescendants ? F(1, 8) : F(1, 4);
      const baseNote = hasDescendants
        ? "یک‌هشتم ترکه، به دلیل وجود فرزند یا نواده"
        : "یک‌چهارم ترکه، به دلیل نبود فرزند یا نواده";
      const shareNote =
        inp.wivesCount > 1
          ? `${baseNote}؛ این سهم میان ${toFa(inp.wivesCount)} همسر به تساوی تقسیم می‌شود.`
          : `${baseNote}.`;
      heirs.push({
        key: "wife",
        label: inp.wivesCount > 1 ? `همسران (${toFa(inp.wivesCount)} نفر)` : "همسر (زوجه)",
        frac: spouseFrac,
        count: inp.wivesCount,
        cat: "spouse",
        note: shareNote + " زوجه از عینِ زمین ارث نمی‌برد، تنها از قیمتِ اعیانی و اموال منقول — طبق نساء ۱۲.",
      });
    }
  } else {
    if (inp.spouseAlive) {
      spouseFrac = hasDescendants ? F(1, 4) : F(1, 2);
      heirs.push({
        key: "husband",
        label: "همسر (زوج)",
        frac: spouseFrac,
        count: 1,
        cat: "spouse",
        note:
          (hasDescendants
            ? "یک‌چهارم ترکه، به دلیل وجود فرزند یا نواده"
            : "نیمی از ترکه، به دلیل نبود فرزند یا نواده") + " — طبق نساء ۱۲.",
      });
    }
  }

  let remaining = F(1).sub(spouseFrac);
  let noBloodHeir = false;

  if (hasClass1) {
    activeClass = "اول";
    let fatherFrac = ZERO, motherFrac = ZERO;

    if (hasDescendants) {
      if (inp.fatherAlive) fatherFrac = F(1, 6);
      if (inp.motherAlive) motherFrac = F(1, 6);
    } else {
      if (inp.fatherAlive && inp.motherAlive) {
        const hajbCount =
          (inp.hajbPaternalLineSiblings || 0) +
          (inp.hajbIncludeMaternal ? inp.hajbMaternalOnlySiblings || 0 : 0);
        const hajb = hajbCount >= 2;
        motherFrac = hajb ? F(1, 6) : F(1, 3);
        fatherFrac = remaining.sub(motherFrac);
      } else if (inp.motherAlive) {
        motherFrac = remaining;
      } else if (inp.fatherAlive) {
        fatherFrac = remaining;
      }
    }

    if (inp.fatherAlive)
      heirs.push({
        key: "father",
        label: "پدر",
        frac: fatherFrac,
        count: 1,
        cat: "parent",
        note: hasDescendants
          ? "یک‌ششم ترکه، به دلیل وجود فرزند یا نواده — طبق نساء ۱۱."
          : inp.motherAlive
          ? "باقیِ ترکه، پس از کسرِ سهمِ مادر."
          : "کلِ باقیمانده، به عنوان تنها وارثِ طبقهٔ اول.",
      });

    if (inp.motherAlive)
      heirs.push({
        key: "mother",
        label: "مادر",
        frac: motherFrac,
        count: 1,
        cat: "parent",
        note: hasDescendants
          ? "یک‌ششم ترکه، به دلیل وجود فرزند یا نواده — طبق نساء ۱۱."
          : ((inp.hajbPaternalLineSiblings || 0) + (inp.hajbIncludeMaternal ? inp.hajbMaternalOnlySiblings || 0 : 0)) >= 2
          ? "یک‌ششم، به دلیل حَجبِ نقصان با دو یا چند خواهر/برادرِ متوفی (خودشان در اینجا ارثی نمی‌برند، فقط سهمِ مادر را می‌کاهند)."
          : inp.fatherAlive
          ? "یک‌سوم ترکه — طبق نساء ۱۱."
          : "کلِ باقیمانده، به عنوان تنها وارثِ طبقهٔ اول (بازگشتِ سهم / رَدّ).",
      });

    const consumedByParents = fatherFrac.add(motherFrac);
    const forChildren = remaining.sub(consumedByParents);

    if (hasDescendants && !forChildren.isZero()) {
      // اگر متوفی حداقل یک فرزندِ زنده دارد، طبقِ دیدگاهِ مشهورِ فقهِ امامیه
      // (قاعدهٔ «الاقرب یمنع الابعد»)، نوه‌های حاصل از فرزندِ درگذشته ارث نمی‌برند
      // مگر آنکه کاربر حالتِ «وصیتِ واجب» (مادهٔ ۸۶۳ قانونِ مدنی) را انتخاب کرده باشد.
      const grandchildrenMode = inp.grandchildrenMode || "classical";
      const useVasiyyatVajiba = hasLivingChildren && grandchildrenMode === "vasiyyatVajiba" && deceasedChildBranches.length > 0;
      const excludeBranches = hasLivingChildren && grandchildrenMode === "classical" && deceasedChildBranches.length > 0;
      const includeBranchesInPool = !hasLivingChildren || useVasiyyatVajiba;

      let totalUnits = inp.sons * 2 + inp.daughters * 1;
      if (includeBranchesInPool) {
        deceasedChildBranches.forEach((c) => {
          totalUnits += c.gender === "male" ? 2 : 1;
        });
      }

      if (totalUnits > 0) {
        const unit = forChildren.div(F(totalUnits));

        // سهمِ خامِ هر شاخهٔ فرزندِ درگذشته را از پیش حساب می‌کنیم تا در حالتِ
        // «وصیتِ واجب» بتوانیم سقفِ یک‌سومِ کلِ ترکه را اعمال کنیم.
        let branchRawFracs = [];
        let branchRawTotal = ZERO;
        if (includeBranchesInPool) {
          deceasedChildBranches.forEach((c, idx) => {
            const raw = unit.mul(F(c.gender === "male" ? 2 : 1));
            branchRawFracs.push({ c, idx, raw });
            branchRawTotal = branchRawTotal.add(raw);
          });
        }

        let branchScale = F(1); // ضریبِ کاهش در صورتِ عبور از سقفِ یک‌سوم
        let branchCapped = false;
        let sonsExtra = ZERO, daughtersExtra = ZERO;
        if (useVasiyyatVajiba && branchRawTotal.toNumber() > 1 / 3 + 1e-9) {
          branchCapped = true;
          branchScale = F(1, 3).div(branchRawTotal);
          const excess = branchRawTotal.sub(F(1, 3));
          // مازادِ بیش از سقف، طبقِ قانونِ مدنی به فرزندانِ زنده بازمی‌گردد
          const livingUnits = inp.sons * 2 + inp.daughters * 1;
          if (livingUnits > 0) {
            const exUnit = excess.div(F(livingUnits));
            sonsExtra = exUnit.mul(F(2 * inp.sons));
            daughtersExtra = exUnit.mul(F(1 * inp.daughters));
          }
        }

        if (inp.sons > 0)
          heirs.push({
            key: "sons",
            label: `پسر (${toFa(inp.sons)} نفر)`,
            frac: unit.mul(F(2 * inp.sons)).add(sonsExtra),
            count: inp.sons,
            cat: "child",
            note: "سهمِ هر پسر دو برابرِ سهمِ هر دختر است — طبق نساء ۱۱.",
          });

        if (inp.daughters > 0)
          heirs.push({
            key: "daughters",
            label: `دختر (${toFa(inp.daughters)} نفر)`,
            frac: unit.mul(F(1 * inp.daughters)).add(daughtersExtra),
            count: inp.daughters,
            cat: "child",
            note:
              inp.sons === 0
                ? "سهمِ قرآنی به‌همراه بازگشتِ باقیماندهٔ ترکه (رَدّ)، چون پسری در میان نیست."
                : "نیمِ سهمِ هر پسر.",
          });

        if (excludeBranches) {
          warnings.push(
            "چون متوفی فرزندِ زنده دارد، نوه‌های حاصل از فرزندِ درگذشته طبقِ دیدگاهِ مشهورِ فقهِ امامیه ارث نمی‌برند (قاعدهٔ «الاقرب یمنع الابعد»: فرزندِ زنده، نوه را از ارثِ مستقیم محروم می‌کند). در صورتِ تمایل، می‌توانید در بخشِ «فرزندان» حالتِ «وصیتِ واجب» را فعال کنید تا سهمی بر پایهٔ قانونِ مدنیِ ایران (با سقفِ یک‌سوم) برای این نوه‌ها محاسبه شود."
          );
        }

        if (includeBranchesInPool) {
          branchRawFracs.forEach(({ c, idx, raw }) => {
            const branchFrac = raw.mul(branchScale);
            const subTotal = c.sons * 2 + c.daughters * 1;
            if (subTotal > 0) {
              const subUnit = branchFrac.div(F(subTotal));
              const parentLabel = c.gender === "male" ? "پسرِ درگذشته" : "دخترِ درگذشته";
              const vasiyyatNote = useVasiyyatVajiba
                ? ` به‌عنوانِ «وصیتِ واجب» طبقِ مادهٔ ۸۶۳ قانونِ مدنیِ ایران (نه ارثِ مستقیم)، چون فرزندِ زنده در میان است.${branchCapped ? " این مبلغ به دلیلِ سقفِ یک‌سومِ ترکه نسبت به مقدارِ کاملِ محاسبه‌شده کاهش یافته است." : ""}`
                : " به‌جای فرزندِ درگذشته می‌نشیند، چون فرزندِ دیگری زنده نیست.";
              if (c.sons > 0)
                heirs.push({
                  key: `gc-son-${idx}`,
                  label: `نوهٔ پسری (از ${parentLabel}) — ${toFa(c.sons)} نفر`,
                  frac: subUnit.mul(F(2 * c.sons)),
                  count: c.sons,
                  cat: "child",
                  note: vasiyyatNote,
                });
              if (c.daughters > 0)
                heirs.push({
                  key: `gc-dau-${idx}`,
                  label: `نوهٔ دختری (از ${parentLabel}) — ${toFa(c.daughters)} نفر`,
                  frac: subUnit.mul(F(1 * c.daughters)),
                  count: c.daughters,
                  cat: "child",
                  note: vasiyyatNote,
                });
            }
          });
        }
      }
    }
  } else {
    // ---------- طبقهٔ دوم: اجداد و خواهر/برادر ----------
    const hasFull = (inp.fullBrothers || 0) + (inp.fullSisters || 0) > 0;
    const effFullB = inp.fullBrothers || 0, effFullS = inp.fullSisters || 0;
    const effPatB = hasFull ? 0 : inp.paternalBrothers || 0;
    const effPatS = hasFull ? 0 : inp.paternalSisters || 0;
    const maternalSibCount = inp.maternalSiblingsCount || 0;

    const pgf = !!inp.paternalGrandfather, pgm = !!inp.paternalGrandmother;
    const mgf = !!inp.maternalGrandfather, mgm = !!inp.maternalGrandmother;

    const paternalUnits = (pgf ? 2 : 0) + (pgm ? 1 : 0) + (effFullB + effPatB) * 2 + (effFullS + effPatS) * 1;
    const maternalUnits = (mgf ? 1 : 0) + (mgm ? 1 : 0) + maternalSibCount * 1;
    const hasClass2 = paternalUnits > 0 || maternalUnits > 0;

    if (hasClass2) {
      activeClass = "دوم";
      let paternalGroupFrac = ZERO, maternalGroupFrac = ZERO;

      if (paternalUnits > 0 && maternalUnits > 0) {
        paternalGroupFrac = remaining.mul(F(2, 3));
        maternalGroupFrac = remaining.mul(F(1, 3));
        warnings.push(
          "اجتماعِ جد/جده با برادر/خواهر در یک ترکه، از مسائلِ محلِ اختلافِ فقهاست. این محاسبه بر پایهٔ تقسیمِ رایج (دوسوم/یک‌سوم میانِ خط پدری و مادری) انجام شده و بهتر است در چنین ترکیبی با مرجعِ تقلید یا کارشناسِ حقوقی مشورت کنید."
        );
      } else if (paternalUnits > 0) {
        paternalGroupFrac = remaining;
      } else {
        maternalGroupFrac = remaining;
      }

      if (paternalUnits > 0 && (pgf || pgm) && (effFullB + effFullS + effPatB + effPatS) > 0) {
        warnings.push(
          "اجتماعِ جد/جدهٔ پدری با خواهر/برادرِ هم‌خط، خود از مسائلِ بسیار مورد اختلافِ فقهاست؛ برخی فقها جد را مقدم بر خواهر/برادر می‌دانند و ارثِ آنان را ساقط می‌کنند، و برخی دیگر (دیدگاهِ مشهور که در این محاسبه به‌کار رفته) جد را هم‌ردیفِ برادر (سهمی دو برابرِ خواهر) با آنان شریک می‌دانند. بهتر است در این ترکیب با مرجعِ تقلید مشورت کنید."
        );
      }

      if (paternalUnits > 0) {
        const u = paternalGroupFrac.div(F(paternalUnits));
        if (pgf) heirs.push({ key: "pgf", label: "جدِ پدری", frac: u.mul(F(2)), count: 1, cat: "class2", note: "سهمِ جدِ پدری دو برابرِ جدهٔ پدری است." });
        if (pgm) heirs.push({ key: "pgm", label: "جدهٔ پدری", frac: u.mul(F(1)), count: 1, cat: "class2", note: "نیمِ سهمِ جدِ پدری." });
        if (effFullB + effPatB > 0)
          heirs.push({
            key: "pbros",
            label: `برادرِ ${hasFull ? "ابوینی" : "پدری"} (${toFa(effFullB + effPatB)} نفر)`,
            frac: u.mul(F(2 * (effFullB + effPatB))),
            count: effFullB + effPatB,
            cat: "class2",
            note: "دو برابرِ سهمِ خواهرِ هم‌ردهٔ خود.",
          });
        if (effFullS + effPatS > 0)
          heirs.push({
            key: "psis",
            label: `خواهرِ ${hasFull ? "ابوینی" : "پدری"} (${toFa(effFullS + effPatS)} نفر)`,
            frac: u.mul(F(1 * (effFullS + effPatS))),
            count: effFullS + effPatS,
            cat: "class2",
            note: "نیمِ سهمِ برادرِ هم‌ردهٔ خود.",
          });
      }
      if (maternalUnits > 0) {
        const u = maternalGroupFrac.div(F(maternalUnits));
        if (mgf) heirs.push({ key: "mgf", label: "جدِ مادری", frac: u.mul(F(1)), count: 1, cat: "class2", note: "خویشاوندانِ خطِ مادری در فقه امامیه به تساوی سهم می‌برند." });
        if (mgm) heirs.push({ key: "mgm", label: "جدهٔ مادری", frac: u.mul(F(1)), count: 1, cat: "class2", note: "خویشاوندانِ خطِ مادری در فقه امامیه به تساوی سهم می‌برند." });
        if (maternalSibCount > 0)
          heirs.push({
            key: "msibs",
            label: `برادر و خواهرِ مادری (${toFa(maternalSibCount)} نفر)`,
            frac: u.mul(F(maternalSibCount)),
            count: maternalSibCount,
            cat: "class2",
            note: "به تساوی میانِ خود، صرف‌نظر از جنسیت.",
          });
      }
    } else {
      // ---------- طبقهٔ سوم: عمو/عمه/دایی/خاله ----------
      const pUncles = inp.paternalUnclesCount || 0, pAunts = inp.paternalAuntsCount || 0;
      const mUnclesAunts = inp.maternalUnclesAuntsCount || 0;
      const paternalUnits3 = pUncles * 2 + pAunts * 1;
      const maternalUnits3 = mUnclesAunts * 1;
      const hasClass3 = paternalUnits3 > 0 || maternalUnits3 > 0;

      if (hasClass3) {
        activeClass = "سوم";
        let pFrac = ZERO, mFrac = ZERO;
        if (paternalUnits3 > 0 && maternalUnits3 > 0) {
          pFrac = remaining.mul(F(2, 3));
          mFrac = remaining.mul(F(1, 3));
        } else if (paternalUnits3 > 0) {
          pFrac = remaining;
        } else {
          mFrac = remaining;
        }

        if (paternalUnits3 > 0) {
          const u = pFrac.div(F(paternalUnits3));
          if (pUncles > 0) heirs.push({ key: "puncles", label: `عمو (${toFa(pUncles)} نفر)`, frac: u.mul(F(2 * pUncles)), count: pUncles, cat: "class3", note: "دو برابرِ سهمِ عمه." });
          if (pAunts > 0) heirs.push({ key: "paunts", label: `عمه (${toFa(pAunts)} نفر)`, frac: u.mul(F(1 * pAunts)), count: pAunts, cat: "class3", note: "نیمِ سهمِ عمو." });
        }
        if (maternalUnits3 > 0) {
          const u = mFrac.div(F(maternalUnits3));
          heirs.push({
            key: "muncleaunt",
            label: `دایی و خاله (${toFa(mUnclesAunts)} نفر)`,
            frac: u.mul(F(mUnclesAunts)),
            count: mUnclesAunts,
            cat: "class3",
            note: "به تساوی میانِ خود، صرف‌نظر از جنسیت.",
          });
        }
      } else {
        noBloodHeir = true;
      }
    }
  }

  let treasuryFrac = ZERO;
  if (noBloodHeir) {
    if (spouseFrac.isZero()) {
      treasuryFrac = F(1);
      warnings.push("هیچ وارثِ نسبی یا سببی‌ای یافت نشد؛ کلِ ترکه به حاکمِ شرع (بیت‌المال) می‌رسد.");
    } else if (inp.gender === "female" && inp.spouseAlive) {
      const extra = F(1).sub(spouseFrac);
      heirs.forEach((h) => {
        if (h.key === "husband") h.frac = h.frac.add(extra);
      });
      warnings.push("در نبودِ هرگونه وارثِ نسبی، بنا بر دیدگاهِ مشهور، تمامِ ترکه به زوج بازمی‌گردد.");
    } else {
      treasuryFrac = F(1).sub(spouseFrac);
      warnings.push(
        "در نبودِ هرگونه وارثِ نسبی، بنا بر دیدگاهِ مشهور، سهمِ زوجه افزایش نمی‌یابد و باقیمانده به حاکمِ شرع می‌رسد. برخی فقهای معاصر در این مسئله نظرِ متفاوتی دارند؛ نظرِ مرجعِ تقلیدِ خود را جویا شوید."
      );
    }
  }

  return { heirs, treasuryFrac, warnings, activeClass };
}

// هر دسته یک "خانوادهٔ رنگی" (hue پایه) دارد؛ داخلِ هر دسته، رنگِ هر وارث با
// ترکیبی از تغییرِ hue و روشنایی محاسبه می‌شود تا حتی با تعدادِ زیادِ وراث در
// یک دسته (مثلاً تا ۷ نفر در طبقهٔ دوم)، هیچ دو وارثِ متفاوتی رنگِ یکسان نگیرند.
const CAT_HUE = {
  spouse: 38,
  parent: 155,
  child: 25,
  class2: 178,
  class3: 285,
  treasury: 45,
};
function categoryColor(cat, idx, total) {
  const baseHue = CAT_HUE[cat] != null ? CAT_HUE[cat] : 30;
  const hueStep = total > 1 ? (idx * (26 / Math.max(1, total - 1))) - 13 : 0;
  const lightStep = total > 1 ? idx / (total - 1) : 0;
  const lightness = 34 + lightStep * 32; // ۳۴٪ تا ۶۶٪
  return `hsl(${Math.round(baseHue + hueStep)}, 46%, ${Math.round(lightness)}%)`;
}
function assignColors(heirs, treasuryFrac) {
  const catCounters = {};
  const catTotals = {};
  heirs.forEach((h) => {
    catTotals[h.cat] = (catTotals[h.cat] || 0) + 1;
  });
  const map = {};
  heirs.forEach((h) => {
    const idx = catCounters[h.cat] || 0;
    catCounters[h.cat] = idx + 1;
    map[h.key] = categoryColor(h.cat, idx, catTotals[h.cat] || 1);
  });
  if (treasuryFrac && treasuryFrac.toNumber() > 0.0001) {
    map.treasury = "hsl(45, 22%, 55%)";
  }
  return map;
}

function polarToCartesian(cx, cy, r, angleDeg) {
  const a = ((angleDeg - 90) * Math.PI) / 180;
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}
function arcPath(cx, cy, r, startAngle, endAngle) {
  const start = polarToCartesian(cx, cy, r, endAngle);
  const end = polarToCartesian(cx, cy, r, startAngle);
  const largeArc = endAngle - startAngle <= 180 ? 0 : 1;
  return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 0 ${end.x} ${end.y} Z`;
}

function ShamsaWheel({ heirs, treasuryFrac, colorMap }) {
  const size = 250, cx = size / 2, cy = size / 2, r = size / 2 - 34;
  const segments = heirs.map((h) => ({ value: h.frac.toNumber(), color: colorMap[h.key], label: h.label }));
  if (treasuryFrac && treasuryFrac.toNumber() > 0.0001) {
    segments.push({ value: treasuryFrac.toNumber(), color: colorMap.treasury, label: "بیت‌المال" });
  }
  const isEmpty = segments.length === 0;
  let angle = 0;
  const paths = [];
  const onWedgeLabels = [];
  segments.forEach((seg, i) => {
    const sweep = seg.value * 360;
    if (sweep <= 0.05) return;
    const start = angle, end = Math.min(360, angle + sweep);
    paths.push({ d: arcPath(cx, cy, r, start, end), color: seg.color, key: i });
    if (sweep >= 16) {
      const mid = polarToCartesian(cx, cy, r * 0.66, start + sweep / 2);
      onWedgeLabels.push({ x: mid.x, y: mid.y, key: `t-${i}`, text: `${toFa((seg.value * 100).toFixed(sweep >= 30 ? 1 : 0))}٪` });
    }
    angle = end;
  });

  return (
    <div className="shamsa-wrap">
      <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} className="shamsa-svg">
        <circle cx={cx} cy={cy} r={r + 7} fill="none" style={{ stroke: "var(--hairline)" }} strokeWidth="1" strokeDasharray={isEmpty ? "3 5" : "0"} />
        {isEmpty ? (
          <text x={cx} y={cy} textAnchor="middle" dominantBaseline="middle" className="shamsa-empty-text">
            در انتظارِ اطلاعات
          </text>
        ) : (
          <>
            {paths.map((p) => <path d={p.d} fill={p.color} style={{ stroke: "var(--paper-soft)" }} strokeWidth="1.5" key={p.key} />)}
            {onWedgeLabels.map((l) => (
              <text x={l.x} y={l.y} key={l.key} textAnchor="middle" dominantBaseline="middle" className="shamsa-wedge-label">
                {l.text}
              </text>
            ))}
          </>
        )}
        <circle cx={cx} cy={cy} r={r * 0.34} style={{ fill: "var(--paper)", stroke: "var(--brass)" }} strokeWidth="1.5" />
        <text x={cx} y={cy - 2} textAnchor="middle" className="shamsa-center-label">ترکه</text>
        <text x={cx} y={cy + 16} textAnchor="middle" className="shamsa-center-sub">۱۰۰٪</text>
      </svg>
      {!isEmpty && (
        <div className="wheel-legend">
          {segments.map((seg, i) => (
            <div className="legend-item" key={i}>
              <span className="legend-swatch" style={{ background: seg.color }} />
              <span className="legend-label">{seg.label}</span>
              <span className="legend-percent">{toFa((seg.value * 100).toFixed(2))}٪</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MoneyInput({ value, onChange, placeholder }) {
  const { useRef } = React;
  const inputRef = useRef(null);
  const display = value ? Number(value).toLocaleString("en-US") : "";

  const handleChange = (e) => {
    const el = e.target;
    const caret = el.selectionStart ?? el.value.length;
    const digitsBeforeCaret = el.value.slice(0, caret).replace(/[^0-9]/g, "").length;
    const raw = el.value.replace(/[^0-9]/g, "");
    onChange(raw);

    // بعد از فرمت‌شدنِ مجددِ عدد (اضافه/کم‌شدنِ کاماها)، نشانگر را در جای درست برمی‌گردانیم
    requestAnimationFrame(() => {
      const node = inputRef.current;
      if (!node) return;
      const newDisplay = raw ? Number(raw).toLocaleString("en-US") : "";
      let seen = 0, pos = newDisplay.length;
      if (digitsBeforeCaret === 0) {
        pos = 0;
      } else {
        for (let i = 0; i < newDisplay.length; i++) {
          if (/[0-9]/.test(newDisplay[i])) seen++;
          if (seen === digitsBeforeCaret) { pos = i + 1; break; }
        }
      }
      node.setSelectionRange(pos, pos);
    });
  };

  return (
    <input
      ref={inputRef}
      type="text"
      inputMode="numeric"
      className="money-input"
      placeholder={placeholder}
      value={display}
      onChange={handleChange}
    />
  );
}

          {landNum > 0 && distributable !== null && (
            <div className="warnings">
              <p><strong>نکته: </strong>چون ارزشِ زمین وارد شده، مبلغِ نقدیِ زوجه بر پایهٔ ترکه منهای این ارزش محاسبه شده است. سهمِ نسبی/درصدیِ زوجه (که مبنای فقهی است) تغییری نکرده؛ فقط مبلغِ ریالیِ او کمتر نمایش داده می‌شود. توجه کنید که در این محاسبهٔ ساده‌شده، تفاوتِ حاصل به‌طورِ خودکار به سایرِ وراث بازتوزیع نمی‌شود — تعیینِ تکلیفِ دقیقِ آن (مثلاً تسویهٔ نقدی با سایرِ وراث) نیازمندِ مشورت با کارشناسِ حقوقی است.</p>
            </div>
          )}

          <div className="ledger">
            {result.heirs.length === 0 && result.treasuryFrac.isZero() && (
              <p className="ledger-note" style={{ textAlign: "center", marginTop: 16 }}>
                برای دیدنِ نتیجه، اطلاعاتِ وراث را در بالا کامل کنید.
              </p>
            )}
            {result.heirs.map((h) => (
              <LedgerRow key={h.key} h={h} color={colorMap[h.key]} distributable={distributableFor(h)} />
            ))}
            {result.treasuryFrac.toNumber() > 0.0001 && (
              <LedgerRow
                h={{ key: "treasury", label: "بیت‌المال / حاکمِ شرع", frac: result.treasuryFrac, count: 1, note: "در نبود وارثِ کافی، باقیماندهٔ ترکه به حاکمِ شرع می‌رسد." }}
                color={colorMap.treasury}
                distributable={distributable}
              />
            )}
            {(result.heirs.length > 0 || result.treasuryFrac.toNumber() > 0.0001) && (
              <div className="ledger-total-row">
                <span>جمعِ کل</span>
                <span>{toFa((totalCheck * 100).toFixed(2))}٪{distributable !== null ? ` — ${formatRial(distributable)}` : ""}</span>
              </div>
            )}
          </div>

          {(result.heirs.length > 0 || result.treasuryFrac.toNumber() > 0.0001) && (
            <div className="recap-wrap">
              <h3 className="recap-title">جدولِ خلاصهٔ سهم‌ها</h3>
              {distributable !== null && (
                <p className="recap-hint">برای دیدنِ همهٔ ستون‌ها، جدول را به چپ/راست بکشید.</p>
              )}
              <div className="recap-scroll">
                <table className="recap-table">
                  <thead>
                    <tr>
                      <th>وارث</th>
                      <th>تعداد</th>
                      <th>سهمِ گروه</th>
                      {distributable !== null && <th>مبلغِ گروه</th>}
                      <th>سهمِ هر نفر</th>
                      {distributable !== null && <th>مبلغِ هر نفر</th>}
                    </tr>
                  </thead>
                  <tbody>
                    {result.heirs.map((h) => {
                      const perFrac = h.count > 1 ? h.frac.div(F(h.count)) : h.frac;
                      const rowDist = distributableFor(h);
                      return (
                        <tr key={h.key}>
                          <td>{h.label}</td>
                          <td>{toFa(h.count)}</td>
                          <td>
                            <div className="recap-cell">
                              <FractionBadge frac={h.frac} />
                              <span className="recap-cell-percent">{formatPercent(h.frac)}</span>
                            </div>
                          </td>
                          {distributable !== null && <td>{formatRial(h.frac.toNumber() * rowDist)}</td>}
                          <td>
                            <div className="recap-cell">
                              <FractionBadge frac={perFrac} />
                              <span className="recap-cell-percent">{formatPercent(perFrac)}</span>
                            </div>
                          </td>
                          {distributable !== null && <td>{formatRial(perFrac.toNumber() * rowDist)}</td>}
                        </tr>
                      );
                    })}
                    {result.treasuryFrac.toNumber() > 0.0001 && (
                      <tr className="recap-treasury">
                        <td>بیت‌المال / حاکمِ شرع</td>
                        <td>{toFa(1)}</td>
                        <td>
                          <div className="recap-cell">
                            <FractionBadge frac={result.treasuryFrac} />
                            <span className="recap-cell-percent">{formatPercent(result.treasuryFrac)}</span>
                          </div>
                        </td>
                        {distributable !== null && <td>{formatRial(result.treasuryFrac.toNumber() * distributable)}</td>}
                        <td>
                          <div className="recap-cell">
                            <FractionBadge frac={result.treasuryFrac} />
                            <span className="recap-cell-percent">{formatPercent(result.treasuryFrac)}</span>
                          </div>
                        </td>
                        {distributable !== null && <td>{formatRial(result.treasuryFrac.toNumber() * distributable)}</td>}
                      </tr>
                    )}
                  </tbody>
                  <tfoot>
                    <tr>
                      <td>جمعِ کل</td>
                      <td>{toFa(totalHeadcount)} نفر</td>
                      <td>{toFa((totalCheck * 100).toFixed(2))}٪</td>
                      {distributable !== null && <td>{formatRial(distributable)}</td>}
                      <td colSpan={distributable !== null ? 2 : 1} style={{ fontWeight: 400, fontSize: 11, opacity: 0.75 }}>
                        بسته به هر وارث متفاوت است — ردیفِ خودش را ببینید
                      </td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>
          )}

          {(result.heirs.length > 0 || result.treasuryFrac.toNumber() > 0.0001) && (
            <div className="ledger-bottom-controls">
              <ThemeToggle darkMode={darkMode} onChange={setDarkMode} />
            </div>
          )}

          {result.warnings.length > 0 && (
            <div className="warnings">
              {result.warnings.map((w, i) => (
                <p key={i}><strong>نکته: </strong>{w}</p>
              ))}
            </div>
          )}
        </div>

        <div className="footer-note">
          این ابزار برای آشنایی و برآوردِ اولیه طراحی شده و بر پایهٔ دیدگاهِ مشهورِ فقهِ امامیهٔ اثنی‌عشری (جعفری) — با نگاهی به بابِ ارثِ قانونِ مدنیِ ایران — عمل می‌کند و فرض می‌کند همهٔ وراثِ نام‌برده از نظرِ شرعی واجدِ شرایطِ ارث‌بری‌اند (مسلمان، آزاد، و بدونِ مانعِ ارث).
          موارد نادر یا پیچیده — مانندِ حملِ جنین، مفقودالاثر، وارثِ قاتل، اختلافِ دین یا نسب، فرزندخواندگی، یا اجتماعِ هم‌زمانِ جد و اخوه — نیازمندِ بررسیِ کارشناسی‌اند و ممکن است نتیجه را تغییر دهند.
          برای تقسیمِ واقعیِ ترکه، حتماً با مرجعِ تقلید یا کارشناسِ حقوقی مشورت کنید.
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<InheritanceApp />);
</script>
</body>
</html>
